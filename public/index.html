<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Lead Router</title><link rel="stylesheet" href="/styles.css"></head><body><main>
<header><p class="eyebrow">ASCII BOX · MODEL EVALUATION</p><h1>Lead Router</h1><p class="lede">Find the best accessible OpenAI model for one frozen, evidence-backed lead workflow.</p></header>
<form id="form"><label>Workflow repository<input id="repository" value="https://github.com/ardjo-s/ascii-box-lead-workflow" required></label><label>Ref<input id="ref" value="main" required></label><label>Run label<input id="run-label" placeholder="Friday demo" maxlength="80"></label><button>Run comparison</button></form>
<p id="status" role="status"></p><section id="results" hidden><article id="recommendation"></article><h2>Model ranking</h2><div class="table-wrap"><table><thead><tr><th>#</th><th>Model</th><th>Quality</th><th>Cost</th><th>Latency</th><th>Composite</th><th>Eligibility</th></tr></thead><tbody id="ranking"></tbody></table></div>
<div class="split"><article><h2>Skipped</h2><ul id="skipped"></ul></article><article><h2>Failed</h2><ul id="failed"></ul></article></div><article><h2>Limitations</h2><ul id="limitations"></ul></article><button id="copy" type="button">Copy raw JSON</button><details><summary>Raw report</summary><pre id="raw"></pre></details></section>
</main><script type="module" src="/app.js"></script></body></html>
