<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Lead Router</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main>
      <nav class="site-nav" aria-label="Primary navigation">
        <a class="wordmark" href="/">Lead Router</a>
        <a href="/methodology">Methodology</a>
      </nav>
      <p class="eyebrow">GINSE ACTION · ASCII BOX</p>
      <h1>Smart Router</h1>
      <p class="lede">Paste the workflow repository. Get one evidence-backed model recommendation.</p>
      <form id="form">
        <label>
          Workflow repository
          <input id="repository" value="https://github.com/ardjo-s/ascii-box-lead-workflow" required>
        </label>
        <button>Recommend a model</button>
      </form>
      <p id="status" role="status"></p>
      <article id="answer" aria-live="polite" hidden></article>
      <p class="methodology-link">Want the exact formulas and limits? <a href="/methodology">Read the evaluation methodology.</a></p>
    </main>
    <script type="module" src="/app.js"></script>
  </body>
</html>
